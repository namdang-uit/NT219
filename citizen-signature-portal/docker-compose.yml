services:
  tsp:
    build: ./tsp
    ports:
      - "8001:8001"
    environment:
      - TSP_PORT=8001
    restart: unless-stopped

  portal:
    build: ./portal
    ports:
      - "8501:8501"
    environment:
      - TSP_BASE_URL=http://tsp:8001
    depends_on:
      - tsp
    restart: unless-stopped